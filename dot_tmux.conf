# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-network-bandwidth'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Colors
if-shell -b 'infocmp tmux-256color >/dev/null 2>&1' \
        'set -g default-terminal "tmux-256color"' \
        'set -g default-terminal "screen-256color"'

# TrueColor and Italics
set -ga terminal-overrides ',*:Tc'
set -ga terminal-overrides ',*:Sitm=\E[3m'

set -g mouse on
set -g focus-events on

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi copy mode
set-window-option -g mode-keys vi

##### Naming: window = running command, session = project root #####
# Window name tracks the foreground command per pane (reverts to zsh when idle),
# native and flicker-free. notify.conf only redefines the window-status FORMAT
# that renders #W, so there is no collision. The SESSION name is driven by the
# zsh chpwd hook in ~/.zsh/custom/functions/tmux-session-name.zsh.
setw -g automatic-rename on
set  -g automatic-rename-format '#{pane_current_command}'

# Mark new sessions auto vs manual so the zsh namer knows to back off: a numeric
# default name (0,1,2...) is auto (manage it); any name with a non-digit (e.g.
# `tmux new -s foo`) is manual (leave it alone). The hook runs in the new
# session's context, so a bare `set-option` targets it; do NOT use
# `-t "#{hook_session}"` (that format does not resolve here and mis-targets).
set-hook -g session-created \
  'if -F "#{m:*[!0-9]*,#{session_name}}" \
     "set-option @auto_named 0" \
     "set-option @auto_named 1"'

# Manual rename ($) marks the session manual so the auto-namer backs off.
bind '$' command-prompt -I "#S" "rename-session -- '%%' ; set-option @auto_named 0"

set-option -g default-shell $SHELL
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'

# Same pane split bindings
## vertical
# bind '|' split-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
## horizontal
# bind '-' split-window -h -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
# bind 'c'  command-prompt -I "$PWD" -p "New session dir:" "attach -c %1"
# bind c new-window -c "#{pane_current_path}"

#run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'
## Requires tmux-cpu and tmux-network-bandwidth
# Notification config - appearance, groups, sounds, the binary->group map, and
# thresholds - all live in ONE file now: ~/.config/notify/notify.yaml, read by
# ~/.config/notify/lib.sh. notify_fire resolves a group and pushes per-pane
# runtime flags that conf.d/notify.conf renders; tmux holds no notify config.

source-file ~/.tmux/conf.d/clipboard.conf
source-file ~/.tmux/conf.d/scrollback.conf
source-file ~/.tmux/conf.d/status.conf
# notify.conf re-defines window-status formats; source after status.conf.
source-file ~/.tmux/conf.d/notify.conf
# This needs to stay at bottom
run '~/.tmux/plugins/tpm/tpm'
