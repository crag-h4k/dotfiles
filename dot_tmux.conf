# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Colors
if-shell -b 'infocmp tmux-256color >/dev/null 2>&1' \
        'set -g default-terminal "tmux-256color"' \
        'set -g default-terminal "screen-256color"'

# TrueColor and Italics
set -ga terminal-overrides ',*:Tc'
set -ga terminal-overrides ',*:Sitm=\E[3m'

set -g mouse on
set -g focus-events on

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi copy mode
set-window-option -g mode-keys vi

set-option -g default-shell $SHELL
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'

# Same pane split bindings
## vertical
# bind '|' split-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
## horizontal
# bind '-' split-window -h -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
# bind 'c'  command-prompt -I "$PWD" -p "New session dir:" "attach -c %1"
# bind c new-window -c "#{pane_current_path}"

#run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'
## Requires tmux-cpu and tmux-net-speed
# Notification settings (used by ~/.claude/hooks/notify-tmux.sh and ~/.tmux/conf.d/notify.conf)
#
# @notify_color - pane background when Claude finishes. Dracula-derived dark options:
declare -A colors
colors[dark_red]='#5b1a1a'
colors[dark_purple]-'#3d1a5b'   # dark purple    (Dracula purple: #bd93f9)
colors[dark_green]='#1a3d1a'   # dark green     (Dracula green:  #50fa7b)
colors[dark_orange]='#3d2a10'   # dark orange    (Dracula orange: #ffb86c)
colors[dark_cyan]='#10303d'   # dark cyan      (Dracula cyan:   #8be9fd)
colors[dracula_bg]='#282a36'   # Dracula bg     (subtle, nearly invisible)
#
long_processes=("terraform", "brew", "apt")
declare -A notification_colors
declare -A notification_sounds
notification_colors[$long_processes]=''
notify_colors['error']=${colors[dark_red]}
notification_sounds['error']='sosumi.mp3'
notifcation_colors['claude']=${colors[dark_cyan]}
notification_sounds['claude']='funk.mp3'
set -g @notify_color ${colors[dark_red]}
# set -g @notify_color ${colors[dark_purple]}
# set -g @notify_color ${colors[dark_green]}
# set -g @notify_color ${colors[dark_orange]}
# set -g @notify_color ${colors[dark_cyan]}
# set -g @notify_color ${colors[dracula_bg]}
#
# @notify_sound - MP3 played on notification. Available files in ~/.tmux/sounds/:
set -g @notify_sound '~/.tmux/sounds/funk.mp3'
# set -g @notify_sound '~/.tmux/sounds/glass.mp3'
# set -g @notify_sound '~/.tmux/sounds/sosumi.mp3'
# set -g @notify_sound '~/.tmux/sounds/submarine.mp3'
#
# @notify_volume - playback volume 0-100:
# set -g @notify_volume '25'   # (default)
# set -g @notify_volume '50'
# set -g @notify_volume '75'
# set -g @notify_volume '100'
set -g @notify_volume '25'

source-file ~/.tmux/conf.d/clipboard.conf
source-file ~/.tmux/conf.d/scrollback.conf
source-file ~/.tmux/conf.d/status.conf
# notify.conf re-defines window-status formats; source after status.conf.
source-file ~/.tmux/conf.d/notify.conf
# This needs to stay at bottom
run '~/.tmux/plugins/tpm/tpm'
