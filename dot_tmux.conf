# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Colors
if-shell -b 'infocmp tmux-256color >/dev/null 2>&1' \
        'set -g default-terminal "tmux-256color"' \
        'set -g default-terminal "screen-256color"'

# TrueColor and Italics
set -ga terminal-overrides ',*:Tc'
set -ga terminal-overrides ',*:Sitm=\E[3m'

set -g mouse on
set -g focus-events on

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi copy mode
set-window-option -g mode-keys vi

set-option -g default-shell $SHELL
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'

# Same pane split bindings
## vertical
# bind '|' split-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
## horizontal
# bind '-' split-window -h -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
# bind 'c'  command-prompt -I "$PWD" -p "New session dir:" "attach -c %1"
# bind c new-window -c "#{pane_current_path}"

#run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'
## Requires tmux-cpu and tmux-net-speed
# Notification appearance (source of truth). Each group sets a pane background
# (bg), a status-bar dot accent, and an optional sound (file in ~/.tmux/sounds/,
# '' = visual only). Read by ~/.claude/hooks/notify-*.sh and the zsh process
# notifier; the zsh side (~/.zsh/custom/functions/notify-process.zsh) owns only
# the binary->group mapping and the ignore-list, not the colors.
#
# Palette (Dracula-derived darks for bg; brights for accents):
#   dark_red #5b1a1a  dark_purple #3d1a5b  dark_green #1a3d1a
#   dark_orange #3d2a10  dark_cyan #10303d   (bg=default tracks the terminal theme)
#
# @notify_volume - playback volume 0-100:
set -g @notify_volume '75'
#
# claude  - Claude finished a turn / needs you
set -g @notify_claude_bg      '#10303d'
set -g @notify_claude_accent  '#8be9fd'
# set -g @notify_claude_sound   'funk.mp3'
set -g @notify_claude_sound   'funk.mp3'
set -g @notify_claude_sound   'smoke-detector-chirp.mp3'
# codex   - reserved (no trigger wired yet)
set -g @notify_codex_bg       '#3d1a5b'
set -g @notify_codex_accent   '#bd93f9'
set -g @notify_codex_sound    'glass.mp3'
# iac     - terraform / tofu / tflint finished
set -g @notify_iac_bg         '#3d2a10'
set -g @notify_iac_accent     '#ffb86c'
set -g @notify_iac_sound      ''
# pkg     - brew / apt / npm / ... finished
set -g @notify_pkg_bg         '#1a3d1a'
set -g @notify_pkg_accent     '#50fa7b'
set -g @notify_pkg_sound      ''
# error   - a tracked or long command exited nonzero
set -g @notify_error_bg       '#5b1a1a'
set -g @notify_error_accent   '#ff5555'
set -g @notify_error_sound    'sosumi.mp3'
# default - any other command past the duration threshold
set -g @notify_default_bg     '#5b1a1a'
set -g @notify_default_accent '#ff5555'
set -g @notify_default_sound  'submarine.mp3'

source-file ~/.tmux/conf.d/clipboard.conf
source-file ~/.tmux/conf.d/scrollback.conf
source-file ~/.tmux/conf.d/status.conf
# notify.conf re-defines window-status formats; source after status.conf.
source-file ~/.tmux/conf.d/notify.conf
# This needs to stay at bottom
run '~/.tmux/plugins/tpm/tpm'
