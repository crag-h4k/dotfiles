# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-network-bandwidth'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Colors
if-shell -b 'infocmp tmux-256color >/dev/null 2>&1' \
        'set -g default-terminal "tmux-256color"' \
        'set -g default-terminal "screen-256color"'

# TrueColor and Italics
set -ga terminal-overrides ',*:Tc'
set -ga terminal-overrides ',*:Sitm=\E[3m'

set -g mouse on
set -g focus-events on

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi copy mode
set-window-option -g mode-keys vi

set-option -g default-shell $SHELL
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'

# Same pane split bindings
## vertical
# bind '|' split-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
## horizontal
# bind '-' split-window -h -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
# bind 'c'  command-prompt -I "$PWD" -p "New session dir:" "attach -c %1"
# bind c new-window -c "#{pane_current_path}"

#run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'
## Requires tmux-cpu and tmux-network-bandwidth
# Notification appearance (source of truth). A named palette maps color names to
# hex once; each group below references names only (no raw hex). bg = pane tint,
# accent = status-bar dot, sound = file in ~/.tmux/sounds/ ('' = silent). Read by
# ~/.claude/hooks/notify-*.sh and the zsh process notifier; notify_fire resolves a
# name to its @palette_<name> hex. The zsh side
# (~/.zsh/custom/functions/notify-process.zsh) owns only the binary->group map and
# ignore-list, not the colors.
#
# Palette (Dracula-derived): dark_* for pane backgrounds, bright_* for accents.
set -g @palette_dark_red      '#5b1a1a'
set -g @palette_dark_purple   '#3d1a5b'
set -g @palette_dark_green    '#1a3d1a'
set -g @palette_dark_orange   '#3d2a10'
set -g @palette_dark_cyan     '#10303d'
set -g @palette_dark_pink     '#4d1a38'
set -g @palette_bright_red    '#ff5555'
set -g @palette_bright_purple '#bd93f9'
set -g @palette_bright_green  '#50fa7b'
set -g @palette_bright_orange '#ffb86c'
set -g @palette_bright_cyan   '#8be9fd'
set -g @palette_bright_pink   '#ff79c6'
#
# @notify_volume - playback volume 0-100:
set -g @notify_volume '75'
#
# Per group: bg / accent are palette names (or 'default' to track the theme);
# sound is a filename in ~/.tmux/sounds ('' = silent).
# claude  - Claude finished a turn / needs you
set -g @notify_claude_bg      'dark_pink'
set -g @notify_claude_accent  'bright_pink'
set -g @notify_claude_sound   'funk.mp3'
# codex   - reserved (no trigger wired yet)
set -g @notify_codex_bg       'dark_purple'
set -g @notify_codex_accent   'bright_purple'
set -g @notify_codex_sound    'glass.mp3'
# iac     - terraform / tofu / tflint finished
set -g @notify_iac_bg         'dark_orange'
set -g @notify_iac_accent     'bright_orange'
set -g @notify_iac_sound      ''
# pkg     - brew / apt / npm / ... finished
set -g @notify_pkg_bg         'dark_green'
set -g @notify_pkg_accent     'bright_green'
set -g @notify_pkg_sound      ''
# error   - a tracked or long command exited nonzero
set -g @notify_error_bg       'dark_red'
set -g @notify_error_accent   'bright_red'
set -g @notify_error_sound    'sosumi.mp3'
# default - any other command past the duration threshold
set -g @notify_default_bg     'dark_red'
set -g @notify_default_accent 'bright_red'
set -g @notify_default_sound  'submarine.mp3'

source-file ~/.tmux/conf.d/clipboard.conf
source-file ~/.tmux/conf.d/scrollback.conf
source-file ~/.tmux/conf.d/status.conf
# notify.conf re-defines window-status formats; source after status.conf.
source-file ~/.tmux/conf.d/notify.conf
# This needs to stay at bottom
run '~/.tmux/plugins/tpm/tpm'
