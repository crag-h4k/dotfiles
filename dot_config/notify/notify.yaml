# ~/.config/notify/notify.yaml
# Single source of truth for the attention-notification system. Read via yq
# (mikefarah/yq v4) by the shared reader in ~/.config/notify/lib.sh from two
# places: the zsh process notifier (builds its binary->group map once at shell
# init) and the Claude/Codex hooks. tmux only renders the runtime per-pane flags
# notify_fire sets; it never reads this file. Override the path with $NOTIFY_CONFIG.

settings:
  # Defaults for every group; any group may override them.
  volume: 75          # sound playback 0-100
  threshold: 0        # min seconds a matched command must run before it fires.
                      # 0 = fire as soon as it finishes. The catch-all 'default'
                      # group raises its own so random short commands stay quiet.
  debug: false        # append a timestamped trace to the log below (self-caps
                      # at ~1 MB). Env NOTIFY_DEBUG=1 / NOTIFY_LOG=<path> override.
  log: ~/.config/notify/notify.log

  # Interactive / long-lived programs: never fire the command-completion path
  # when these exit. Integration names (below) are added automatically, so you
  # do NOT list claude/codex here.
  ignore: [vim, nvim, vi, nano, emacs, less, more, man, ssh, htop, top, btop,
           watch, tmux, fzf, tail, bat, w3m, lynx]

# Color names -> hex. Groups reference names (bg: dark_pink), not raw hex. A
# value that is not a palette name (a raw #hex, or 'default'/'terminal') passes
# through unchanged.
palette:
  dark_red:      "#5b1a1a"
  dark_purple:   "#3d1a5b"
  dark_green:    "#1a3d1a"
  dark_orange:   "#3d2a10"
  dark_cyan:     "#10303d"
  dark_pink:     "#4d1a38"
  bright_red:    "#ff5555"
  bright_purple: "#bd93f9"
  bright_green:  "#50fa7b"
  bright_orange: "#ffb86c"
  bright_cyan:   "#8be9fd"
  bright_pink:   "#ff79c6"

# Command-completion groups: a finished command whose binary is listed fires this
# group if it ran >= its threshold. bg tints the pane, accent is the status-bar
# dot, sound is a file in ~/.tmux/sounds ('' = silent).
groups:
  iac:
    bg: dark_orange
    accent: bright_orange
    sound: ""
    binaries: [terraform, terragrunt, tofu, tflint]
  pkg:
    bg: dark_green
    accent: bright_green
    sound: ""
    binaries: [brew, apt, apt-get, dnf, yum, pip, pip3, npm, pnpm, yarn, cargo]

  # Per-group overrides in action: only ping for a slow sync (>=60s), quietly.
  slow_processes:
    bg: dark_cyan
    accent: bright_cyan
    sound: glass.mp3
    threshold: 60
    binaries: [rsync, rclone, borg, dd]

  # Special groups (no binaries) the notifier references directly:
  default:            # any unmatched command that ran >= threshold
    bg: dark_red
    accent: bright_red
    sound: submarine.mp3
    threshold: 30
  error:              # any tracked/long command that exited nonzero
    bg: dark_red
    accent: bright_red
    sound: sosumi.mp3
    volume: 90        # louder than the default

# Integration groups: fired by an event hook, NOT by running a command. Names
# here are auto-added to ignore, so launching the CLI never fires the
# command-completion path - only the integration's hook does. (threshold has no
# effect here; these are event-driven. volume still applies to the sound.)
integrations:
  claude:             # Claude Code Stop / Notification / AskUserQuestion (PreToolUse) hooks
    bg: dark_pink
    accent: bright_pink
    sound: funk.mp3
  codex:              # reserved - wire a hook to fire this
    bg: dark_purple
    accent: bright_purple
    sound: glass.mp3
