# ~/.config/ghostty/themes/gud-theme.conf
#
# "Gud" palette: a Dracula-family variant (converted from the old iTerm2 theme).
# This file is the single source of color truth for Ghostty. It is referenced by
# `theme = gud-theme.conf` in the main config and matches the Dracula colors used
# in the tmux status line and the nvim colorscheme, so the whole terminal reads
# as one rice. Edit colors here only.

# Core colors
background = #1E1F29
foreground = #E6E6E6

# Cursor + selection
cursor-color = #BBBBBB
cursor-text = #FFFFFF
selection-background = #44475A
selection-foreground = #FFFFFF

# 16-color ANSI palette (Dracula)
palette = 0=#000000
palette = 1=#FF5555
palette = 2=#50FA7B
palette = 3=#F1FA8C
palette = 4=#BD93F9
palette = 5=#FF79C6
palette = 6=#8BE9FD
palette = 7=#BBBBBB
palette = 8=#555555
palette = 9=#FF5555
palette = 10=#50FA7B
palette = 11=#F1FA8C
palette = 12=#BD93F9
palette = 13=#FF79C6
palette = 14=#8BE9FD
palette = 15=#FFFFFF
