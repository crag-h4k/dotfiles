# Pre-commit hooks for tilde. Run on every `git commit`; set up via
# `pre-commit install` (see README "Daily operation").

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
        # Skip files that are not raw TOML documents:
        #   .chezmoiexternal.toml - a chezmoi Go template (gated by component),
        #     so it does not parse until chezmoi renders it.
        #   modify_*.toml - chezmoi modify_ scripts (e.g.
        #     dot_codex/modify_private_config.toml.tmpl renders to Python that
        #     merges `notify` into ~/.codex/config.toml), not TOML documents.
        exclude: |
          (?x)(
            ^\.chezmoiexternal\.toml$|
            (^|/)modify_[^/]*\.toml$
          )
      - id: check-json
        # chezmoi modify_ scripts that target a *.json file are executable
        # scripts (e.g. dot_claude/modify_settings.json.tmpl renders to Python
        # that merges hooks into ~/.claude/settings.json), not JSON documents.
        exclude: (^|/)modify_[^/]*\.json$
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        # zsh config files carry `#!/bin/zsh` or `#!/usr/bin/env zsh` as a
        # filetype hint but are sourced by zsh, not executed.
        exclude: |
          (?x)^(
            dot_zshrc$|
            dot_zshenv$|
            dot_zsh/aliases$|
            dot_zsh/custom/functions/.*\.zsh$
          )$

  # Shell-script linting for the install scripts in scripts/. Exclude:
  #   - chezmoi .tmpl files (Go template syntax is not valid sh)
  #   - dot_zsh/* — zsh is not supported by shellcheck (SC1071)
  # -x follows `# shellcheck source=...` directives inside scripts.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['-x']
        exclude: |
          (?x)^(
            .*\.tmpl$|
            dot_zsh/.*
          )$

  # Markdown linting (global rule: markdownlint-compliant).
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml]

  # Lua formatting. stylua-github downloads a prebuilt binary, so no rust/cargo
  # or system stylua is required. Config: .stylua.toml.
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.5.2
    hooks:
      - id: stylua-github

  # Lua linting (static analysis). Run as a system hook, not the hosted
  # language:lua hook: luacheck 1.2.0 crashes on Lua 5.5 (Homebrew's default),
  # so install-neovim.sh installs it against Lua 5.4 and puts it on PATH, and
  # the CI workflow installs it via apt luarocks. Config: .luacheckrc.
  - repo: local
    hooks:
      - id: luacheck
        name: luacheck
        entry: luacheck
        language: system
        types: [lua]

  # Render the component-gated chezmoi templates across combinations and parse
  # the result. check-toml skips .chezmoiexternal.toml (it is a Go template), so
  # this is what actually validates the rendered TOML before it reaches a host.
  - repo: local
    hooks:
      - id: validate-chezmoi-templates
        name: validate chezmoi templates render and parse
        entry: scripts/validate-templates.sh
        language: script
        pass_filenames: false
        files: ^(\.chezmoiexternal\.toml|\.chezmoi\.toml\.tmpl|scripts/(confirm-install|package-plan|validate-templates)\.sh)$

      - id: validate-palettes
        name: validate shared palettes render
        entry: scripts/validate-palettes.sh
        language: script
        pass_filenames: false
        files: ^(\.chezmoidata/palettes\.yaml|dot_(config/(ghostty|iterm2|notify|nvim|statusline)|tmux/conf\.d|codex/themes|zsh/theme).*)$

      - id: pytest-notify
        name: pytest notify (modify_settings.json.tmpl)
        entry: uv run --with pytest pytest tests/test_merge_settings.py -v
        language: system
        pass_filenames: false
        files: ^(dot_claude/modify_settings\.json\.tmpl|tests/test_merge_settings\.py)$

      - id: pytest-notify-codex
        name: pytest notify (modify_private_config.toml.tmpl)
        entry: uv run --with pytest pytest tests/test_merge_codex_config.py -v
        language: system
        pass_filenames: false
        files: ^(dot_codex/modify_private_config\.toml\.tmpl|tests/test_merge_codex_config\.py)$

      - id: pytest-statusline-tokens
        name: pytest statusline (statusline-tokens.py)
        entry: uv run --with pytest pytest tests/test_statusline_tokens.py -v
        language: system
        pass_filenames: false
        files: ^(dot_claude/executable_statusline-tokens\.py|tests/test_statusline_tokens\.py|tests/fixtures/statusline/.*)$

      - id: bats-notify
        name: bats (notify + statusline + render-shim)
        entry: bats
        args: [tests/test_lib.bats, tests/test_process.bats, tests/test_statusline_command.bats, tests/test_render_modify_shim.bats, tests/test_package_plan.bats]
        language: system
        pass_filenames: false
        files: ^(dot_config/notify/.*|dot_zsh/custom/functions/notify-process\.zsh|dot_claude/executable_statusline-command\.sh|scripts/(confirm-install|install-notify|install|package-plan)\.sh|dot_claude/modify_settings\.json\.tmpl|dot_codex/modify_private_config\.toml\.tmpl|tests/test_(lib|process|statusline_command|render_modify_shim|package_plan)\.bats|tests/fixtures/.*)$
