---
name: pre-commit

# Enforce the same hooks that run locally - including validate-templates.sh,
# which renders the component-gated chezmoi templates and parses the result.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      # validate-templates.sh needs chezmoi to render the templates.
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Add chezmoi to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # luacheck and bats run as language:system pre-commit hooks, so they must
      # be on PATH. zsh is required by test_process.bats (_notify_resolve_bin
      # uses zsh-specific syntax and is tested via `zsh -c`).
      - name: Install luacheck, bats-core, and zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks bats zsh
          sudo luarocks install luacheck

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
