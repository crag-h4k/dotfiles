---
name: ci

# One file for the whole tag/release lifecycle: pre-commit gates both event
# types, then a PR gets a tag preview and a push to main gets the real tag +
# release. anothrNick/github-tag-action runs in dry-run mode in both
# downstream jobs: it only computes the next version and never pushes, so
# softprops/action-gh-release is the one that creates the tag and the
# release together, atomically.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  pre-commit:
    uses: ./.github/workflows/pre-commit.yaml

  tag-preview:
    needs: pre-commit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          DEFAULT_BRANCH: main
          DRY_RUN: "true"

      - name: Comment tag preview
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: tag-preview
          message: |
            Current tag: `${{ steps.tag.outputs.old_tag }}`
            Merging this PR will cut: `${{ steps.tag.outputs.new_tag }}`

  release:
    needs: pre-commit
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          DEFAULT_BRANCH: main
          DRY_RUN: "true"

      - name: Create tag and release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
