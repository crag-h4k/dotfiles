##### claude-squad / Claude Code integration #####
# Only present when the `claudesquad` chezmoi component is selected (gated in
# .chezmoiignore). Sourced conditionally from ~/.tmux.conf.
#
# All bindings are after the tmux prefix. Your prefix is the default Ctrl-b, so
# "prefix C" means: press Ctrl-b, release, then press the key. Capitals need
# Shift (e.g. "C" = Shift-c, "J" = Shift-j).

# Type: prefix C   (Ctrl-b, then Shift-c)
# claude-squad launcher + overview in a popup: create/list/switch parallel Claude
# Code agents, each in its own tmux session (claudesquad_*) and git worktree
# (~/.claude-squad/worktrees/). Inside the popup: 'n' new agent, Enter attach,
# 'D' kill, 'q' close the popup.
bind C display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'cs'

# Type: prefix J   (Ctrl-b, then Shift-j)
# Jump to a running agent. Opens tmux's native tree picker filtered to
# claude-squad sessions; move with j/k or arrows, Enter to switch, q to cancel.
bind J choose-tree -sZ -f '#{m:claudesquad_*,#{session_name}}'

# Type: prefix g   (Ctrl-b, then g)
# Scratch Claude in a popup: a persistent throwaway session (attach-or-create).
# Reopening with the same keys resumes it. Detach with prefix d, or 'exit' to end.
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  'tmux attach -t scratch-claude 2>/dev/null || tmux new -s scratch-claude claude'
