##### Visual "done" flags (pane recolor + border + window flag) #####
# Visual only - no bell, no audio. Driven by the zsh pane-notify hooks
# (dot_zsh/pane-notify.zsh): a finished command or an idle interactive agent
# recolors/flags its pane and window; focusing the pane clears it.

set -g visual-silence on        # silence alert is visual, never audible
set -g monitor-bell off         # no bell-based signalling (no audio)

# zsh arms `monitor-silence` while an agent runs; when it goes quiet, recolor its
# pane background and mark the pane (@done) and window (@notify). Recolor BOTH
# window-style (inactive panes / splits) and window-active-style (the active or
# lone pane) so it shows in any layout. The native silence flag also flags the
# tab via #F below. Color matches PANE_NOTIFY_BG's default - update both together.
set-hook -g alert-silence 'set -p @done 1 ; set -w @notify 1 ; set -p window-style "bg=#5b1a1a" ; set -p window-active-style "bg=#5b1a1a"'

# Acknowledge by focusing the pane: clear the flags, reset the bg, stop the watcher.
set-hook -g pane-focus-in 'set -p @done "" ; set -w @notify "" ; set -pu window-style ; set -pu window-active-style ; run-shell "rm -f \"$HOME/.cache/pane-notify/#{pane_id}\" 2>/dev/null"'

# Pane-level marker (only rendered when a window is split).
set -g pane-border-status top
set -g pane-border-format '#{?@done,#[bg=#ff5555]#[fg=#282a36] done #[default] ,}#P:#{pane_current_command}'

# Window-status flag (overrides the formats in status.conf, which is sourced
# first). #F surfaces tmux's native flags (~ silence, ! bell) - this is the
# automatic idle indicator. #{?@notify,...} adds a red dot for the zsh-driven
# completion case. window-status-activity-style colors the native silence flag.
setw -g window-status-activity-style 'fg=#282a36,bg=#ffb86c,bold'
setw -g window-status-bell-style 'fg=#282a36,bg=#ff5555,bold'
setw -g window-status-format ' #I:#W#F#{?@notify,#[fg=#282a36]#[bg=#ff5555]#[bold] ● #[default],} '
setw -g window-status-current-format ' #I:#W#F '
