# ~/.tmux/conf.d/notify.conf
##### Attention notification (Claude/Codex + shell processes) #####
# Triggers set @notify on the pane+window and recolor the pane via the helpers
# in ~/.config/notify/lib.sh: the Claude Code Stop / Notification /
# PreToolUse:AskUserQuestion hooks for AI attention, and zsh preexec/precmd
# (~/.zsh/custom/functions/notify-process.zsh) for finished long/named processes.
# All appearance/groups come from ~/.config/notify/notify.yaml. This file only
# renders the status-bar flag, colored per group via @notify_accent. Source after
# status.conf - it overrides window-status-format.

set -g visual-silence on
set -g monitor-bell off

# Clear the flag on selecting the flagged pane, or on input (key/mouse) in it.
# Switching windows/tabs or refocusing the terminal from another app deliberately
# does NOT clear, so the status-bar tab keeps signalling until you engage the
# pane. The key binding forwards the original key unchanged and only runs the
# helper while the receiving pane is flagged.
set-hook -g after-select-pane   'set-option -p @notify "" ; set-option -w @notify "" ; set-option -p @notify_accent "" ; set-option -w @notify_accent "" ; set-option -pu window-style ; set-option -pu window-active-style'

# `send-keys` with no key argument forwards the key that triggered an Any
# binding. Existing specific root bindings still win, so tmux prefix commands
# keep their normal behavior.
bind-key -n -T root Any \
  if-shell -F '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{pane_id}"' '' \; \
  send-keys

# Preserve tmux 3.7's common pane mouse behavior while clearing the pane under
# the mouse. Right-click menus and uncommon mouse bindings remain untouched.
bind-key -T root MouseDown1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane -t = \; send-keys -M
bind-key -T root MouseDrag1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' \
    'send-keys -M' 'copy-mode -M'
bind-key -T root WheelUpPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  if-shell -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' \
    'send-keys -M' 'copy-mode -e'
bind-key -T root WheelDownPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  if-shell -F '#{||:#{alternate_on},#{mouse_any_flag}}' 'send-keys -M' ''

bind-key -T copy-mode MouseDown1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; select-pane
bind-key -T copy-mode MouseDrag1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X begin-selection
bind-key -T copy-mode WheelDownPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X -N 5 scroll-down
bind-key -T copy-mode WheelUpPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X -N 5 scroll-up

bind-key -T copy-mode-vi MouseDown1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; select-pane
bind-key -T copy-mode-vi MouseDrag1Pane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X begin-selection
bind-key -T copy-mode-vi WheelDownPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X -N 5 scroll-down
bind-key -T copy-mode-vi WheelUpPane \
  if-shell -F -t = '#{@notify}' \
    'run-shell "~/.config/notify/clear-pane.sh #{mouse_pane}"' '' \; \
  select-pane \; send-keys -X -N 5 scroll-up

# Pane border marker (only visible in split layouts): filled accent dot.
set -g pane-border-status top
set -g pane-border-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#{?@palette_red,#{@palette_red},#ff5555}}]#[fg=black]#[bold] ● #[default] ,}#P:#{pane_current_command}'

# Window tab: fill the whole tab with the group accent when flagged so it stands
# out even when a TUI owns the pane. Overrides window-status-format from status.conf.
setw -g window-status-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#{?@palette_red,#{@palette_red},#ff5555}}]#[fg=black]#[bold] #I:#W ● #[default], #I:#W }'
setw -g window-status-current-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#{?@palette_red,#{@palette_red},#ff5555}}]#[fg=black]#[bold] #I:#W ● #[default], #I:#W }'
