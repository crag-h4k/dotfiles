# ~/.tmux/conf.d/notify.conf
##### Claude Code visual notification #####
# The Claude Code Stop hook (~/.claude/hooks/notify-tmux.sh) fires when Claude
# finishes a response. It sets @notify on the pane+window and recolors the pane
# background dark red. This file handles the display and the focus-clear.
# Source this after status.conf - it overrides window-status-format.

set -g visual-silence on
set -g monitor-bell off

# Notification is cleared by the UserPromptSubmit hook in ~/.claude/hooks/notify-clear.sh,
# not on focus - so the red background persists until you actually type something.

# Pane border marker (only visible in split layouts).
set -g pane-border-status top
set -g pane-border-format \
  '#{?@notify,#[bg=#ff5555]#[fg=#282a36] ● #[default] ,}#P:#{pane_current_command}'

# Window tab red dot. Overrides window-status-format from status.conf.
setw -g window-status-format \
  ' #I:#W#{?@notify,#[fg=#282a36]#[bg=#ff5555]#[bold] ● #[default],} '
setw -g window-status-current-format \
  ' #I:#W#{?@notify,#[fg=#282a36]#[bg=#ff5555]#[bold] ● #[default],} '
