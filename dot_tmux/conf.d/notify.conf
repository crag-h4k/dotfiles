# ~/.tmux/conf.d/notify.conf
##### Attention notification (Claude/Codex + shell processes) #####
# Triggers set @notify on the pane+window and recolor the pane via the helpers
# in ~/.tmux/notify-lib.sh: the Claude Code Stop/Notification hooks for AI
# attention, and zsh preexec/precmd (~/.zsh/custom/functions/notify-process.zsh)
# for finished long/named processes. This file renders the status-bar flag,
# colored per group via @notify_accent. Source after status.conf - it overrides
# window-status-format.

set -g visual-silence on
set -g monitor-bell off

# Clear the flag when you return focus to a pane: selecting it, switching to its
# window, or refocusing the terminal from another app. (tmux 3.6 has no working
# pane-focus-in hook; these command/client hooks are what actually fire on those
# actions.) This is in addition to the AI UserPromptSubmit clear and the zsh
# first-keystroke clear. A full-screen TUI (e.g. claude) paints over the pane
# background, so the status-bar tab below - not the pane recolor - is the
# reliable signal for those panes.
set-hook -g after-select-pane   'set-option -p @notify "" ; set-option -w @notify "" ; set-option -p @notify_accent "" ; set-option -w @notify_accent "" ; set-option -pu window-style ; set-option -pu window-active-style'
set-hook -g after-select-window 'set-option -p @notify "" ; set-option -w @notify "" ; set-option -p @notify_accent "" ; set-option -w @notify_accent "" ; set-option -pu window-style ; set-option -pu window-active-style'
set-hook -g client-focus-in     'set-option -p @notify "" ; set-option -w @notify "" ; set-option -p @notify_accent "" ; set-option -w @notify_accent "" ; set-option -pu window-style ; set-option -pu window-active-style'

# Pane border marker (only visible in split layouts): filled accent dot.
set -g pane-border-status top
set -g pane-border-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#ff5555}]#[fg=black]#[bold] ● #[default] ,}#P:#{pane_current_command}'

# Window tab: fill the whole tab with the group accent when flagged so it stands
# out even when a TUI owns the pane. Overrides window-status-format from status.conf.
setw -g window-status-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#ff5555}]#[fg=black]#[bold] #I:#W ● #[default], #I:#W }'
setw -g window-status-current-format \
  '#{?@notify,#[bg=#{?@notify_accent,#{@notify_accent},#ff5555}]#[fg=black]#[bold] #I:#W ● #[default], #I:#W }'
