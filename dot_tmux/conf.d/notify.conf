##### Visual "done" flags (pane border + window flag) #####
# Visual only - no bell, no audio. Driven by the zsh pane-notify hooks
# (dot_zsh/custom/functions/pane_notify.zsh): a finished command or an idle
# interactive agent flags its pane/window; focusing the pane clears it.

set -g visual-silence on        # silence alert is visual, never audible
set -g monitor-bell off         # no bell-based signalling (no audio)

# zsh arms `monitor-silence` while a command runs; when an interactive agent goes
# quiet, mark its pane (@done) and window (@notify).
set-hook -g alert-silence 'set -p @done 1 ; set -w @notify 1'

# Acknowledge by focusing the pane: clear the flags and stop any repeat watcher.
set-hook -g pane-focus-in 'set -p @done "" ; set -w @notify "" ; run-shell "rm -f \"$HOME/.cache/pane-notify/#{pane_id}\" 2>/dev/null"'

# Pane-level marker (only rendered when a window is split).
set -g pane-border-status top
set -g pane-border-format '#{?@done,#[bg=#ff5555]#[fg=#282a36] done #[default] ,}#P:#{pane_current_command}'

# Window-status flag for @notify (overrides the formats in status.conf, which is
# sourced first). Dracula red dot on the flagged window.
setw -g window-status-format ' #I:#W#{?@notify,#[fg=#282a36]#[bg=#ff5555]#[bold] ● #[default],} '
setw -g window-status-current-format ' #I:#W '
