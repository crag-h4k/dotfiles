##### Cross-platform clipboard #####
# Built-in OSC52 integration
set -g set-clipboard on

# Advertise OSC52 (the `Ms` capability) for all terminals so `set-clipboard on`
# actually fires. macOS's xterm-256color terminfo lacks Ms, so without this tmux
# never emits OSC52 and clipboard writes (especially from a remote tmux over SSH)
# silently fail. iTerm2 (with AllowClipboardAccess on) and Ghostty both accept
# OSC52; Ghostty's xterm-ghostty terminfo already advertises Ms, so this is a
# no-op there.
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Detect fallback copy command

if -b '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1' \
  'set -g @copy_cmd "wl-copy"'

if -b '[ -z "$WAYLAND_DISPLAY" ] && command -v xclip >/dev/null 2>&1' \
  'set -g @copy_cmd "xclip -selection clipboard"'

if -b 'command -v pbcopy >/dev/null 2>&1' \
  'set -g @copy_cmd "pbcopy"'

# 3. Bindings
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '#{?@copy_cmd,#{@copy_cmd},cat}'
bind -T copy-mode-vi Y send-keys -X copy-pipe '#{?@copy_cmd,#{@copy_cmd},cat}'
bind -T copy-mode     C-c send-keys -X copy-pipe-and-cancel '#{?@copy_cmd,#{@copy_cmd},cat}'

# 4. Mouse capture toggle (prefix+m)
# On  = tmux owns the drag: copy-mode drag-select + tmux-yank copy (no Shift).
# Off = tmux releases the mouse so Ghostty native selection takes the whole grid
#       (cross-pane grabs). Off also disables tmux scroll + mouse pane-select until
#       toggled back; that is the native-selection mode. display-message runs after
#       `set`, so it reports the new state.
bind m set -g mouse \; display-message "mouse: #{?mouse,on,off}"
