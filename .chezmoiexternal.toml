# Upstream plugins, fetched and refreshed by chezmoi. Gated by component:
# the zsh block only renders when components.zsh is true, the tmux block when
# components.tmux is true. Selection lives in ~/.config/chezmoi/chezmoi.toml.
# `dig` defaults a missing component to its install-by-default value so an
# un-init'd config degrades to "install everything" instead of erroring.
{{ if dig "components" "zsh" true . -}}
[".zsh/ohmyzsh"]
    type = "git-repo"
    url = "https://github.com/ohmyzsh/ohmyzsh.git"
    refreshPeriod = "168h"
    [".zsh/ohmyzsh".pull]
        args = ["--ff-only"]

[".zsh/custom/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"
    [".zsh/custom/plugins/zsh-autosuggestions".clone]
        args = ["--depth=1"]

[".zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    refreshPeriod = "168h"
    [".zsh/custom/plugins/zsh-syntax-highlighting".clone]
        args = ["--depth=1"]

[".zsh/custom/plugins/zsh-completions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-completions.git"
    refreshPeriod = "168h"
    [".zsh/custom/plugins/zsh-completions".clone]
        args = ["--depth=1"]
{{ end -}}
{{ if dig "components" "tmux" true . -}}
