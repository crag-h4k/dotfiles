# .chezmoidata/palettes.yaml
# Canonical color data for every managed terminal surface. Consumer templates
# select one entry through data.palette and must not carry their own hex copies.

paletteOrder:
  - dracula
  - catppuccin-mocha
  - gruvbox-dark
  - tokyo-night

