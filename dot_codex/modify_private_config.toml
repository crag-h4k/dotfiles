#!/usr/bin/env python3
# chezmoi modify_ script for ~/.codex/config.toml.
# Ensures Codex's notification settings are present WITHOUT clobbering the
# [projects.*] trust and [tui.*] entries Codex writes to this file at runtime.
# chezmoi passes the current file on stdin; this emits the merged result on
# stdout. Idempotent (re-running is a no-op), so it is stable across
# `chezmoi apply` runs. Mirrors dot_claude/modify_settings.json.
#
# Two settings are injected:
#   notify              - runs the tmux attention hook. Codex only ever sends the
#                         external notify program the `agent-turn-complete` event,
#                         so this is the "done / your turn" flag (color + sound).
#                         Codex execs it directly (no shell, no ~ expansion), so
#                         the path is absolute and computed here at apply time.
#                         Always a top-level key (Codex has no `notify` table).
#   tui.notifications   - Codex's built-in alert for the events the external notify
#                         program never receives, notably `approval-requested`
#                         (permission prompts).
#
# Placement of tui.notifications depends on the existing file, because TOML forbids
# defining the same table twice:
#   - If config.toml has a bare `[tui]` table header, `notifications` is injected
#     INSIDE that table (a top-level `tui.notifications` dotted key would create a
#     second, conflicting `tui` table and make the file unparseable).
#   - Otherwise (no tui, or only `[tui.subtable]` headers) it is emitted as a
#     top-level `tui.notifications` dotted key, which coexists fine.
import os
import re
import sys

HOOK = os.path.expanduser("~/.codex/hooks/notify-tmux.sh")
NOTIFY_LINE = 'notify = ["%s"]' % HOOK
NOTIFS = '["agent-turn-complete", "approval-requested"]'
TUI_NOTIF_TOP = "tui.notifications = %s" % NOTIFS
TUI_NOTIF_INLINE = "notifications = %s" % NOTIFS

# Top-level keys we own and always re-add canonically (dropped from the head first).
HEAD_KEYS = {"notify", "tui.notifications"}

key_re = re.compile(r'^\s*([A-Za-z0-9_."-]+)\s*=')
table_re = re.compile(r"^\s*\[")
bare_tui_re = re.compile(r"^\s*\[tui\]\s*$")

lines = sys.stdin.read().splitlines()

# Partition into the leading top-level section (before the first table header)
# and the rest (tables onward).
head, rest, in_rest = [], [], False
for line in lines:
    if not in_rest and table_re.match(line):
        in_rest = True
    (rest if in_rest else head).append(line)

# Drop existing occurrences of our top-level keys from the head; we re-add them
# canonically below.
kept = []
for line in head:
    m = key_re.match(line)
    if m and m.group(1) in HEAD_KEYS:
        continue
    kept.append(line)
while kept and kept[0].strip() == "":
    kept.pop(0)
while kept and kept[-1].strip() == "":
    kept.pop()

has_bare_tui = any(bare_tui_re.match(line) for line in rest)

if has_bare_tui:
    # Inject `notifications` inside the existing [tui] table: re-emit it right
    # after the header and drop any stale `notifications =` from that table body.
    new_rest = []
    i, n = 0, len(rest)
    while i < n:
        line = rest[i]
        new_rest.append(line)
        i += 1
        if bare_tui_re.match(line):
            new_rest.append(TUI_NOTIF_INLINE)
            while i < n and not table_re.match(rest[i]):
                m = key_re.match(rest[i])
                if not (m and m.group(1) == "notifications"):
                    new_rest.append(rest[i])
                i += 1
    rest = new_rest

# Compose: notify always top-level; tui.notifications top-level only when there is
# no bare [tui] table to fold it into.
out = [NOTIFY_LINE]
if not has_bare_tui:
    out.append(TUI_NOTIF_TOP)
if kept:
    out.append("")
    out.extend(kept)
if rest:
    if out[-1].strip() != "":
        out.append("")
    out.extend(rest)

sys.stdout.write("\n".join(out) + "\n")
